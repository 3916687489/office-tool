name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: pip install pyinstaller
      - run: pyinstaller --noconfirm --onefile --windowed --name office_tool comprehensive_office_tool.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/office_tool.exe
